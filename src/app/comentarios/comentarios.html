<div class="muro-container">
  <header class="encabezado-gestor">
    <div class="titulos-nav-central">
      <h1 class="neon-title">EL MURO DE CELUS PAPU</h1>

      <div class="nav-accesos" *ngIf="!authService.isLoggedIn()">
        <button [routerLink]="['/login']" [queryParams]="{ rol: 'usuario' }" class="btn-nav user-btn">
          Iniciar Sesión 👤
        </button>
      </div>
    </div>

    <div class="botones-derecha" *ngIf="authService.isLoggedIn()">
      <button [routerLink]="['/dashboard']" class="btn-nav neon-btn" style="margin-right: 15px;">
        Dashboard ⚙️
      </button>
      <button (click)="authService.logout()" class="btn-nav btn-logout">
        Salir 🚪
      </button>
    </div>
  </header>

  <main class="feed-main">
    <div class="cabecera-derecha">
      <h2>Muro Público de la Comunidad 🗿</h2>

      <button *ngIf="authService.isAdmin()" class="btn-nav neon-btn" (click)="toggleFormulario()">
        {{ mostrarFormulario() ? 'Cerrar' : '+ Publicar Reseña' }}
      </button>
    </div>

    @if (mostrarFormulario() && authService.isAdmin()) {
    <app-formulario (cerrar)="toggleFormulario()" />
    }

    <div class="wall-grid">
      @if (cargando()) {
      <div class="loader-container">
        <span class="loader"></span>
      </div>
      } @else {
      @for (resena of feedMuro(); track resena.id) {
      <div class="glass-wall-card">
        <div class="wall-card-header">
          <img [src]="resena.avatar" alt="Avatar" class="wall-avatar">
          <div class="wall-user-info">
            <span class="wall-username">{{ resena.username }}</span>
            <span class="wall-date">{{ resena.fecha }}</span>
          </div>
        </div>
        <div class="wall-card-body">
          <p class="wall-text">"{{ resena.texto }}"</p>
        </div>
      </div>
      }
      }
    </div>
  </main>
</div>
