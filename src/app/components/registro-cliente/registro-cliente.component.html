<div class="registro-container">
  <div class="glass-card animate-slide-up">
    <div class="header">
      <h1>Únete a la Comunidad</h1>
      <p>Crea tu perfil VIP para beneficios exclusivos</p>
    </div>

    <form (submit)="registrar(); $event.preventDefault()" class="form-grid">
      
      <!-- Selector de Avatar -->
      <div class="avatar-section">
        <label>Elige tu Avatar Papu</label>
        <div class="avatar-grid">
          <img *ngFor="let avatar of avatares" 
               [src]="avatar" 
               [class.active]="avatarSeleccionado() === avatar"
               (click)="seleccionarAvatar(avatar)"
               class="avatar-option"
               alt="Avatar">
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Nombre Completo *</label>
          <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Juan Pérez" required>
        </div>
        <div class="input-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required>
        </div>
      </div>

      <div class="input-group">
        <label>Contraseña *</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres" required>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Dirección</label>
          <input type="text" [(ngModel)]="direccion" name="direccion" placeholder="Calle Falsa 123">
        </div>
        <div class="input-group">
          <label>Ciudad</label>
          <input type="text" [(ngModel)]="ciudad" name="ciudad" placeholder="Cali">
        </div>
      </div>

      <button type="submit" class="btn-neon-green" [disabled]="cargando()">
        <span *ngIf="!cargando()">CREAR CUENTA VIP</span>
        <span *ngIf="cargando()" class="loader"></span>
      </button>

      <div class="footer-links">
        <p>¿Ya tienes cuenta? <a routerLink="/login" class="neon-link">Inicia sesión</a></p>
      </div>
    </form>
  </div>
</div>
