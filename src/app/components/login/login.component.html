<div class="login-container">
  <div class="glass-card animate-pop">
    <div class="header">
      <img src="/logo1.jpg" alt="Celus Papu" class="logo">
      <h1>Panel Supremo</h1>
      <p>Acceso restringido para Administradores</p>
    </div>

    <form (submit)="onLogin($event)" class="form-grid">
      <div class="input-group">
        <label>Nombre de Usuario</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Escribe tu usuario" required>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-neon">
        <span>INICIAR SESIÓN ADMIN</span>
      </button>

      <div class="footer-links">
        <a routerLink="/" class="back-link">Volver al inicio</a>
      </div>
    </form>
    
    <p *ngIf="error" class="error-msg" style="color: #ff4d4d; text-align: center; margin-top: 15px;">{{ error }}</p>
  </div>
</div>
